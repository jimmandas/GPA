<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA v4 · Nurse Case Queue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f6f8;
      color: #1a1d23;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e5ea;
      padding: 18px 32px;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a1d23;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 2px;
    }

    main {
      padding: 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e5ea;
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
      background: #f9fafb;
      border-bottom: 1px solid #e2e5ea;
    }

    tbody tr {
      border-bottom: 1px solid #f0f1f3;
      transition: background 0.1s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr.clickable {
      cursor: pointer;
    }

    tbody tr.clickable:hover {
      background: #f0f7ff;
    }

    tbody tr.inactive {
      opacity: 0.55;
      cursor: default;
    }

    tbody td {
      padding: 14px 16px;
      vertical-align: middle;
    }

    .case-id {
      font-family: "SF Mono", "Fira Mono", "Courier New", monospace;
      font-size: 0.8rem;
      color: #374151;
      font-weight: 600;
    }

    .patient-id {
      font-family: "SF Mono", "Fira Mono", "Courier New", monospace;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .time-cell {
      font-size: 0.8rem;
      color: #6b7280;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .badge-pending_review  { background: #dbeafe; color: #1d4ed8; }
    .badge-approved        { background: #dcfce7; color: #15803d; }
    .badge-escalated       { background: #ffedd5; color: #c2410c; }
    .badge-pended          { background: #f3f4f6; color: #6b7280; }

    .arrow-icon {
      color: #3b82f6;
      font-size: 0.85rem;
      margin-left: 4px;
    }

    .empty-state {
      padding: 48px 16px;
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>GPA v4 · Nurse Case Queue</h1>
  <p>Governed AI-Assisted Prior Authorization Review</p>
</header>

<main>
  <p class="section-title">Pending Cases</p>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Case ID</th>
          <th>Patient ID</th>
          <th>Submitted</th>
          <th>Indication</th>
          <th>Modality</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="case-table-body">
        <!-- Populated by JS -->
      </tbody>
    </table>
  </div>
</main>

<script>
  // API_BASE: the FastAPI server is on port 8000; the static UI is on 8001.
  // We deliberately do NOT use window.location.origin here — that resolves to
  // the UI server (8001) which doesn't host the API. Override at runtime by
  // setting window.GPA_API_BASE before this script loads.
  const API_BASE = window.GPA_API_BASE || "http://" + window.location.hostname + ":8000";
  const CLICKABLE_STATUSES = new Set(["pending_review"]);

  function formatDateTime(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleString("en-US", {
      month: "short", day: "numeric", year: "numeric",
      hour: "2-digit", minute: "2-digit", hour12: true,
      timeZoneName: "short"
    });
  }

  function formatIndication(raw) {
    if (!raw) return "—";
    return String(raw).replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
  }

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[ch]);
  }

  async function loadQueue() {
    const tbody = document.getElementById("case-table-body");
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state">Loading…</td></tr>`;
    try {
      const res = await fetch(`${API_BASE}/api/v1/nurse/queue`);
      if (!res.ok) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">HTTP ${res.status}: ${res.statusText}</td></tr>`;
        return;
      }
      const data = await res.json();
      const cases = data.cases || [];
      cases.sort((a, b) => new Date(a.submitted_at || 0) - new Date(b.submitted_at || 0));

      if (cases.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No cases in queue.</td></tr>`;
        return;
      }

      tbody.innerHTML = cases.map(c => {
        const isClickable = CLICKABLE_STATUSES.has(c.status);
        const rowClass = isClickable ? "clickable" : "inactive";
        const onClick = isClickable
          ? `onclick="window.location.href='nurse_workspace.html?case_id=${encodeURIComponent(c.case_id)}'"` : "";
        const arrow = isClickable ? `<span class="arrow-icon">→</span>` : "";

        return `
          <tr class="${rowClass}" ${onClick}>
            <td><span class="case-id">${escapeHtml(c.case_id)}</span>${arrow}</td>
            <td><span class="patient-id">${escapeHtml(c.patient_id || "—")}</span></td>
            <td class="time-cell">${escapeHtml(formatDateTime(c.submitted_at))}</td>
            <td>${escapeHtml(formatIndication(c.indication_category))}</td>
            <td>${escapeHtml(c.modality || "—")} · ${escapeHtml(c.body_region || "—")}</td>
            <td><span class="badge badge-${escapeHtml(c.status)}">${escapeHtml(String(c.status).replace(/_/g, " "))}</span></td>
          </tr>
        `;
      }).join("");
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-state">Network error: ${escapeHtml(String(err))}</td></tr>`;
    }
  }

  loadQueue();
</script>

</body>
</html>
