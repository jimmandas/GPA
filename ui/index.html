<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA v4 · Audit Log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f6f8;
      color: #1a1d23;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e5ea;
      padding: 18px 24px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a1d23;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 2px;
    }

    /* ---- Two-column layout ---- */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ---- Sidebar ---- */
    aside {
      width: 280px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #e2e5ea;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid #e2e5ea;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      background: #f9fafb;
    }

    .case-list {
      flex: 1;
      overflow-y: auto;
    }

    .case-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f1f3;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .case-item:hover { background: #f0f7ff; }

    .case-item.active {
      background: #eff6ff;
      border-left: 3px solid #3b82f6;
      padding-left: 13px;
    }

    .case-item-id {
      font-family: "SF Mono", "Fira Mono", "Courier New", monospace;
      font-size: 0.8rem;
      font-weight: 700;
      color: #1a1d23;
    }

    .case-item-sub {
      font-size: 0.72rem;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ---- Main audit panel ---- */
    .audit-panel {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .audit-panel-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
    }

    .audit-panel-case {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1d23;
    }

    /* ---- Audit record cards ---- */
    .record-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .record-card {
      background: #fff;
      border: 1px solid #e2e5ea;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* type-specific left border */
    .record-card.type-agent_event         { border-left: 4px solid #3b82f6; }
    .record-card.type-pre_state_record    { border-left: 4px solid #a855f7; }
    .record-card.type-nurse_action_record { border-left: 4px solid #22c55e; }

    .record-top {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .record-type-badge {
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .badge-agent_event         { background: #dbeafe; color: #1d4ed8; }
    .badge-pre_state_record    { background: #f3e8ff; color: #7e22ce; }
    .badge-nurse_action_record { background: #dcfce7; color: #15803d; }

    .agent-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: #1a1d23;
    }

    .record-time {
      font-size: 0.72rem;
      color: #9ca3af;
      font-family: "SF Mono", "Fira Mono", "Courier New", monospace;
      margin-left: auto;
    }

    .record-fields {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .record-field {
      font-size: 0.78rem;
      color: #374151;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .field-key {
      font-weight: 600;
      color: #6b7280;
      min-width: 110px;
      flex-shrink: 0;
    }

    .field-value {
      font-family: "SF Mono", "Fira Mono", "Courier New", monospace;
      font-size: 0.72rem;
      color: #374151;
      word-break: break-all;
    }

    .tool-calls {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tool-call-pill {
      background: #e0f2fe;
      color: #0369a1;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 500;
      font-family: "SF Mono", "Fira Mono", "Courier New", monospace;
    }

    /* ---- Status badge ---- */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.65rem;
      font-weight: 600;
    }

    .badge-pending_review  { background: #dbeafe; color: #1d4ed8; }
    .badge-approved        { background: #dcfce7; color: #15803d; }
    .badge-escalated       { background: #ffedd5; color: #c2410c; }
    .badge-pended          { background: #f3f4f6; color: #6b7280; }

    .empty-audit {
      color: #9ca3af;
      font-size: 0.875rem;
      font-style: italic;
      padding: 16px 0;
    }

    .record-count {
      font-size: 0.75rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

<header>
  <h1>GPA v4 · Audit Log</h1>
  <p>Governance reviewer view — all cases and their AI agent audit trails</p>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-header">Cases</div>
    <div class="case-list" id="case-list"></div>
  </aside>

  <div class="audit-panel" id="audit-panel">
    <p style="color:#9ca3af;font-size:0.875rem;">Select a case to view its audit log.</p>
  </div>
</div>

<script>
/* ------------------------------------------------------------------ */
/*  Fixture data                                                        */
/* ------------------------------------------------------------------ */
const AUDIT_CASES = [
  { case_id: "case_0001", patient_id: "pt_anon_0001", submitted_at: "2026-05-25T14:02:11Z", status: "pending_review" },
  { case_id: "case_0002", patient_id: "pt_anon_0002", submitted_at: "2026-05-25T09:15:00Z", status: "pending_review" }
];

const AUDIT_LOGS = {
  "case_0001": [
    { type: "agent_event", agent: "evidence_summarizer",  at: "2026-05-25T14:02:15Z", output_hash: "sha256:abc123..." },
    { type: "agent_event", agent: "context_retriever",    at: "2026-05-25T14:02:22Z", tool_calls_made: ["patient_history_lookup","prior_imaging_lookup"] },
    { type: "agent_event", agent: "policy_mapper",        at: "2026-05-25T14:02:30Z", tool_calls_made: ["nccn_passage_lookup"] },
    { type: "agent_event", agent: "reasoning_drafter",    at: "2026-05-25T14:02:38Z", output_hash: "sha256:def456..." },
    { type: "pre_state_record", at: "2026-05-25T14:02:39Z", reasoning_brief_hash: "sha256:def456..." }
  ],
  "case_0002": [
    { type: "agent_event", agent: "evidence_summarizer",  at: "2026-05-25T09:15:05Z", output_hash: "sha256:ghi789..." },
    { type: "agent_event", agent: "context_retriever",    at: "2026-05-25T09:15:12Z", tool_calls_made: ["patient_history_lookup","prior_imaging_lookup"] },
    { type: "agent_event", agent: "policy_mapper",        at: "2026-05-25T09:15:20Z", tool_calls_made: ["nccn_passage_lookup"] },
    { type: "agent_event", agent: "reasoning_drafter",    at: "2026-05-25T09:15:28Z", output_hash: "sha256:jkl012..." },
    { type: "pre_state_record", at: "2026-05-25T09:15:29Z", reasoning_brief_hash: "sha256:jkl012..." }
  ]
};

/* ------------------------------------------------------------------ */
/*  Helpers                                                             */
/* ------------------------------------------------------------------ */
function esc(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString("en-US", {
    month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit", second: "2-digit",
    hour12: false, timeZoneName: "short"
  });
}

/* ------------------------------------------------------------------ */
/*  Sidebar                                                             */
/* ------------------------------------------------------------------ */
function renderSidebar(selectedId) {
  const list = document.getElementById("case-list");
  list.innerHTML = AUDIT_CASES.map(c => `
    <div class="case-item ${c.case_id === selectedId ? "active" : ""}"
         onclick="selectCase('${esc(c.case_id)}')">
      <span class="case-item-id">${esc(c.case_id)}</span>
      <div class="case-item-sub">
        <span>${esc(c.patient_id)}</span>
        <span class="badge badge-${c.status}">${c.status.replace(/_/g, " ")}</span>
      </div>
    </div>
  `).join("");
}

/* ------------------------------------------------------------------ */
/*  Record card renderer                                                */
/* ------------------------------------------------------------------ */
function renderRecord(rec) {
  const typeBadge = `<span class="record-type-badge badge-${rec.type}">${esc(rec.type.replace(/_/g, " "))}</span>`;
  const agentLabel = rec.agent ? `<span class="agent-name">${esc(rec.agent)}</span>` : "";
  const timeLabel  = `<span class="record-time">${esc(formatTime(rec.at))}</span>`;

  const fields = [];

  if (rec.output_hash) {
    fields.push(`
      <div class="record-field">
        <span class="field-key">output_hash</span>
        <span class="field-value">${esc(rec.output_hash)}</span>
      </div>
    `);
  }

  if (rec.reasoning_brief_hash) {
    fields.push(`
      <div class="record-field">
        <span class="field-key">reasoning_brief_hash</span>
        <span class="field-value">${esc(rec.reasoning_brief_hash)}</span>
      </div>
    `);
  }

  if (rec.tool_calls_made && rec.tool_calls_made.length > 0) {
    const pills = rec.tool_calls_made.map(t => `<span class="tool-call-pill">${esc(t)}</span>`).join("");
    fields.push(`
      <div class="record-field">
        <span class="field-key">tool_calls_made</span>
        <div class="tool-calls">${pills}</div>
      </div>
    `);
  }

  // Any remaining keys
  const knownKeys = new Set(["type","agent","at","output_hash","reasoning_brief_hash","tool_calls_made"]);
  for (const [k, v] of Object.entries(rec)) {
    if (!knownKeys.has(k)) {
      fields.push(`
        <div class="record-field">
          <span class="field-key">${esc(k)}</span>
          <span class="field-value">${esc(JSON.stringify(v))}</span>
        </div>
      `);
    }
  }

  return `
    <div class="record-card type-${rec.type}">
      <div class="record-top">
        ${typeBadge}
        ${agentLabel}
        ${timeLabel}
      </div>
      ${fields.length ? `<div class="record-fields">${fields.join("")}</div>` : ""}
    </div>
  `;
}

/* ------------------------------------------------------------------ */
/*  Audit panel renderer                                                */
/* ------------------------------------------------------------------ */
function renderAuditPanel(caseId) {
  const panel = document.getElementById("audit-panel");
  const caseData = AUDIT_CASES.find(c => c.case_id === caseId);
  const logs = AUDIT_LOGS[caseId] || [];

  if (!caseData) {
    panel.innerHTML = `<p class="empty-audit">Case not found.</p>`;
    return;
  }

  const headerHTML = `
    <div>
      <p class="audit-panel-title">Audit Log</p>
      <p class="audit-panel-case">${esc(caseId)}</p>
    </div>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <span style="font-size:0.78rem;color:#6b7280;">Patient: <strong>${esc(caseData.patient_id)}</strong></span>
      <span style="font-size:0.78rem;color:#6b7280;">Submitted: <strong>${esc(formatTime(caseData.submitted_at))}</strong></span>
      <span class="badge badge-${caseData.status}">${caseData.status.replace(/_/g," ")}</span>
    </div>
    <div style="height:1px;background:#e2e5ea;"></div>
  `;

  if (logs.length === 0) {
    panel.innerHTML = headerHTML + `<p class="empty-audit">No audit records for this case.</p>`;
    return;
  }

  const recordsHTML = logs.map(renderRecord).join("");
  panel.innerHTML = headerHTML + `
    <div style="display:flex;align-items:center;gap:8px;">
      <p class="audit-panel-title">Agent Events</p>
      <span class="record-count">${logs.length} records</span>
    </div>
    <div class="record-list">${recordsHTML}</div>
  `;
}

/* ------------------------------------------------------------------ */
/*  State                                                               */
/* ------------------------------------------------------------------ */
let selectedCaseId = null;

function selectCase(caseId) {
  selectedCaseId = caseId;
  renderSidebar(caseId);
  renderAuditPanel(caseId);
}

/* ------------------------------------------------------------------ */
/*  Init                                                                */
/* ------------------------------------------------------------------ */
function init() {
  renderSidebar(null);
  // Auto-select first case
  if (AUDIT_CASES.length > 0) {
    selectCase(AUDIT_CASES[0].case_id);
  }
}

init();
</script>

</body>
</html>
