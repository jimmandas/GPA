<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA v4 · Physician Peer Review Queue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f6f8;
      color: #1a1d23;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e5ea;
      padding: 18px 32px;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a1d23;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 2px;
    }

    .role-pill {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #fef3c7;
      color: #92400e;
      vertical-align: middle;
    }

    main {
      padding: 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .meta-line {
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 18px;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e5ea;
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #fafbfc;
      border-bottom: 1px solid #e2e5ea;
    }

    th {
      padding: 10px 16px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid #f1f3f5;
      font-size: 0.9rem;
      vertical-align: top;
    }

    tbody tr:hover {
      background: #f9fafb;
      cursor: pointer;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .case-id {
      font-family: "SF Mono", "Fira Mono", "Courier New", monospace;
      font-size: 0.8rem;
      color: #374151;
      font-weight: 600;
    }

    .summary-cell {
      color: #374151;
      max-width: 340px;
    }

    .nurse-note {
      color: #6b7280;
      font-size: 0.78rem;
      margin-top: 4px;
      font-style: italic;
    }

    .reason-cell {
      font-size: 0.78rem;
      color: #6b7280;
    }

    .time-cell {
      font-size: 0.78rem;
      color: #6b7280;
      white-space: nowrap;
    }

    .arrow-icon {
      color: #3b82f6;
      font-size: 0.85rem;
      margin-left: 4px;
    }

    .empty-state {
      padding: 48px 16px;
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    .error-state {
      padding: 24px 16px;
      text-align: center;
      color: #b91c1c;
      font-size: 0.85rem;
      background: #fef2f2;
    }
  </style>
</head>
<body>

<header>
  <h1>GPA v4 · Physician Peer Review Queue <span class="role-pill">PHYSICIAN</span></h1>
  <p>Cases routed by nurse for peer review. Physician records approve / deny / request additional evidence with clinical basis + guideline citation.</p>
</header>

<main>
  <p class="section-title">Pending Cases</p>
  <p class="meta-line" id="meta-line">Loading…</p>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Case ID</th>
          <th>Reason for Routing</th>
          <th>AI Brief Summary + Nurse Note</th>
          <th>Enqueued</th>
        </tr>
      </thead>
      <tbody id="case-table-body">
        <tr><td colspan="4" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
  // API_BASE: the FastAPI server is on port 8000; the static UI is on 8001.
  // We deliberately do NOT use window.location.origin here — that resolves to
  // the UI server (8001) which doesn't host the API. Override at runtime by
  // setting window.GPA_API_BASE before this script loads.
  const API_BASE = window.GPA_API_BASE || "http://" + window.location.hostname + ":8000";

  async function loadQueue() {
    const body = document.getElementById("case-table-body");
    const meta = document.getElementById("meta-line");

    try {
      const response = await fetch(`${API_BASE}/api/v1/physician/queue`);
      if (!response.ok) {
        body.innerHTML = `<tr><td colspan="4" class="error-state">HTTP ${response.status}: ${response.statusText}</td></tr>`;
        meta.textContent = "Failed to load queue.";
        return;
      }
      const data = await response.json();
      meta.textContent = `${data.pending_count} case${data.pending_count === 1 ? "" : "s"} awaiting review.`;

      if (data.pending_count === 0) {
        body.innerHTML = `<tr><td colspan="4" class="empty-state">No pending cases. Queue is clear.</td></tr>`;
        return;
      }

      body.innerHTML = "";
      for (const entry of data.entries) {
        const tr = document.createElement("tr");
        tr.onclick = () => {
          window.location.href = `physician_workspace.html?case_id=${encodeURIComponent(entry.case_id)}`;
        };

        const summary = entry.ai_brief_summary || "(no AI brief summary)";
        const nurseNote = entry.nurse_note ? `<div class="nurse-note">Nurse: ${escapeHtml(entry.nurse_note)}</div>` : "";

        tr.innerHTML = `
          <td><span class="case-id">${escapeHtml(entry.case_id)}</span><span class="arrow-icon">→</span></td>
          <td class="reason-cell">${escapeHtml(entry.reason)}</td>
          <td class="summary-cell">${escapeHtml(summary)}${nurseNote}</td>
          <td class="time-cell">${escapeHtml(entry.enqueued_at)}</td>
        `;
        body.appendChild(tr);
      }
    } catch (err) {
      body.innerHTML = `<tr><td colspan="4" class="error-state">Network error: ${escapeHtml(String(err))}</td></tr>`;
      meta.textContent = "Could not reach API.";
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[ch]);
  }

  loadQueue();
</script>

</body>
</html>
