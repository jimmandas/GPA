<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA v4 · Case Status Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f6f8;
      color: #1a1d23;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e5ea;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.01em; }
    header p { font-size: 0.8rem; color: #6b7280; margin-top: 2px; }

    .nav-btn {
      background: #6b7280; color: #fff; text-decoration: none;
      padding: 8px 14px; border-radius: 6px; font-size: 0.82rem; font-weight: 600;
      white-space: nowrap;
    }

    main { max-width: 1180px; margin: 0 auto; padding: 24px; }

    /* ---- Backend banner ---- */
    .backend-banner {
      display: flex; align-items: center; gap: 10px;
      background: #fff; border: 1px solid #e2e5ea; border-radius: 8px;
      padding: 10px 16px; margin-bottom: 18px; font-size: 0.8rem; color: #374151;
    }
    .backend-banner .dot { width: 8px; height: 8px; border-radius: 99px; background: #22c55e; flex-shrink: 0; }
    .backend-banner code {
      font-family: "SF Mono", "Fira Mono", monospace; font-size: 0.74rem;
      background: #f3f4f6; padding: 2px 7px; border-radius: 4px; color: #1a1d23;
    }

    /* ---- Filter chips ---- */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .chip {
      border: 1px solid #d1d5db; background: #fff; color: #374151;
      padding: 6px 14px; border-radius: 99px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 6px;
    }
    .chip:hover { border-color: #3b82f6; color: #1d4ed8; }
    .chip.active { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
    .chip .ct {
      font-size: 0.68rem; background: rgba(0,0,0,0.08); padding: 1px 7px; border-radius: 99px;
    }
    .chip.active .ct { background: rgba(255,255,255,0.22); }

    /* ---- Case table ---- */
    .table-wrap { background: #fff; border: 1px solid #e2e5ea; border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em;
      color: #6b7280; font-weight: 700; padding: 12px 16px; background: #f9fafb;
      border-bottom: 1px solid #e2e5ea;
    }
    tbody td { padding: 13px 16px; border-bottom: 1px solid #f0f1f3; font-size: 0.82rem; }
    tbody tr { cursor: pointer; transition: background 0.1s; }
    tbody tr:hover { background: #f0f7ff; }
    tbody tr:last-child td { border-bottom: none; }
    .case-id { font-family: "SF Mono", "Fira Mono", monospace; font-weight: 700; font-size: 0.8rem; }
    .muted { color: #9ca3af; }

    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 99px;
      font-size: 0.68rem; font-weight: 700; text-transform: capitalize;
    }
    .badge-pending_review { background: #dbeafe; color: #1d4ed8; }
    .badge-approved       { background: #dcfce7; color: #15803d; }
    .badge-escalated      { background: #ffedd5; color: #c2410c; }
    .badge-pended         { background: #f3f4f6; color: #6b7280; }

    .empty { padding: 40px; text-align: center; color: #9ca3af; font-style: italic; }

    /* ---- Modal ---- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,0.55);
      display: none; align-items: flex-start; justify-content: center;
      padding: 40px 20px; overflow-y: auto; z-index: 50;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #f5f6f8; border-radius: 12px; width: 100%; max-width: 760px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
    }
    .modal-head {
      background: #fff; padding: 18px 22px; border-bottom: 1px solid #e2e5ea;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    }
    .modal-head h2 { font-size: 1.05rem; font-weight: 700; }
    .modal-head .case-sub { font-size: 0.76rem; color: #6b7280; margin-top: 3px; }
    .modal-close {
      background: none; border: none; font-size: 1.4rem; color: #9ca3af; cursor: pointer;
      line-height: 1; padding: 0 4px;
    }
    .modal-close:hover { color: #1a1d23; }
    .modal-body { padding: 18px 22px; }

    /* ---- Verification banner ---- */
    .verify-banner {
      border-radius: 9px; padding: 14px 16px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .verify-banner.ok   { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .verify-banner.fail { background: #fef2f2; border: 1px solid #fecaca; }
    .verify-icon { font-size: 1.5rem; flex-shrink: 0; }
    .verify-text strong { display: block; font-size: 0.86rem; }
    .verify-text.ok strong   { color: #047857; }
    .verify-text.fail strong { color: #b91c1c; }
    .verify-text span { font-size: 0.74rem; color: #6b7280; font-family: "SF Mono", "Fira Mono", monospace; word-break: break-word; }

    /* ---- Record cards ---- */
    .rec-meta { font-size: 0.75rem; color: #6b7280; margin-bottom: 10px; }
    .record-list { display: flex; flex-direction: column; gap: 10px; }
    .record-card {
      background: #fff; border: 1px solid #e2e5ea; border-radius: 8px;
      padding: 12px 14px; display: flex; flex-direction: column; gap: 7px;
      border-left: 4px solid #cbd5e1;
    }
    .record-card.type-agent_event          { border-left-color: #3b82f6; }
    .record-card.type-pre_state_record     { border-left-color: #a855f7; }
    .record-card.type-nurse_action_record  { border-left-color: #22c55e; }
    .record-card.type-physician_action_record { border-left-color: #f59e0b; }
    .record-card.type-escalation_event     { border-left-color: #ef4444; }

    .record-top { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
    .record-type-badge {
      padding: 2px 9px; border-radius: 99px; font-size: 0.64rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em; background: #eef2ff; color: #4338ca;
    }
    .agent-name { font-size: 0.78rem; font-weight: 700; }
    .sig-pill {
      margin-left: auto; display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.66rem; font-weight: 700; padding: 2px 9px; border-radius: 99px;
    }
    .sig-pill.ok   { background: #dcfce7; color: #15803d; }
    .sig-pill.fail { background: #fee2e2; color: #b91c1c; }
    .sig-pill.none { background: #f3f4f6; color: #9ca3af; }

    .record-field { font-size: 0.74rem; color: #374151; display: flex; gap: 8px; flex-wrap: wrap; }
    .field-key { font-weight: 600; color: #6b7280; min-width: 120px; flex-shrink: 0; }
    .field-value { font-family: "SF Mono", "Fira Mono", monospace; font-size: 0.7rem; word-break: break-all; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>GPA v4 · Case Status Dashboard</h1>
    <p>Live case status from the active storage backend — click any case to verify its cryptographic audit trail</p>
  </div>
  <a href="index.html" class="nav-btn">← Dashboard</a>
</header>

<main>
  <div class="backend-banner">
    <span class="dot"></span>
    <span>Storage backend: <code id="backend-name">…</code> · <span id="total-count">…</span> cases · audit trail is hash-chained + JWS-signed</span>
  </div>

  <div class="filters" id="filters"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Case</th>
          <th>Status</th>
          <th>Records</th>
          <th>Last activity</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="case-rows">
        <tr><td colspan="5" class="empty">Loading cases…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Audit modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h2 id="modal-case-id">—</h2>
        <div class="case-sub" id="modal-case-sub">—</div>
      </div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  const API_BASE = window.GPA_API_BASE || "http://" + window.location.hostname + ":8000";

  const STATUSES = ["all", "pending_review", "approved", "escalated", "pended"];
  let ALL_CASES = [];
  let activeFilter = "all";

  function esc(str) {
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function fmtTime(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    if (isNaN(d)) return esc(iso);
    return d.toLocaleString("en-US", {
      month: "short", day: "numeric", hour: "2-digit", minute: "2-digit", hour12: false
    });
  }

  function statusLabel(s) { return String(s || "pending_review").replace(/_/g, " "); }

  async function loadCases() {
    try {
      const res = await fetch(`${API_BASE}/api/v1/cases`);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      ALL_CASES = data.cases || [];
      document.getElementById("backend-name").textContent = data.backend || "unknown";
      document.getElementById("total-count").textContent = data.total ?? ALL_CASES.length;
    } catch (err) {
      console.error("cases fetch failed:", err);
      document.getElementById("case-rows").innerHTML =
        `<tr><td colspan="5" class="empty">Could not reach the API at ${esc(API_BASE)}.<br>Start it with: <code>PYTHONPATH=. uvicorn api.main:app --port 8000</code></td></tr>`;
    }
  }

  function counts() {
    const c = { all: ALL_CASES.length };
    for (const s of STATUSES) if (s !== "all") c[s] = 0;
    for (const cs of ALL_CASES) {
      const s = cs.status || "pending_review";
      c[s] = (c[s] || 0) + 1;
    }
    return c;
  }

  function renderFilters() {
    const c = counts();
    document.getElementById("filters").innerHTML = STATUSES.map(s => `
      <div class="chip ${s === activeFilter ? "active" : ""}" onclick="setFilter('${s}')">
        ${s === "all" ? "All" : esc(statusLabel(s))}
        <span class="ct">${c[s] || 0}</span>
      </div>
    `).join("");
  }

  function setFilter(s) { activeFilter = s; renderFilters(); renderTable(); }

  function renderTable() {
    const rows = activeFilter === "all"
      ? ALL_CASES
      : ALL_CASES.filter(c => (c.status || "pending_review") === activeFilter);

    const tbody = document.getElementById("case-rows");
    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty">No cases with status "${esc(statusLabel(activeFilter))}".</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(c => `
      <tr onclick="openCase('${esc(c.case_id)}')">
        <td class="case-id">${esc(c.case_id)}</td>
        <td><span class="badge badge-${esc(c.status || "pending_review")}">${esc(statusLabel(c.status))}</span></td>
        <td class="muted">${c.record_count ?? "—"}</td>
        <td class="muted">${fmtTime(c.updated_at)}</td>
        <td style="text-align:right;color:#3b82f6;font-weight:600;font-size:0.78rem;">Verify →</td>
      </tr>
    `).join("");
  }

  function renderRecord(rec) {
    let sigClass = "none", sigText = "no signature";
    if (rec.signature_verified === true)  { sigClass = "ok";   sigText = "✓ signature verified"; }
    if (rec.signature_verified === false) { sigClass = "fail"; sigText = "✗ signature INVALID"; }

    const type = rec.type || "record";
    const agentLabel = rec.agent ? `<span class="agent-name">${esc(rec.agent)}</span>` : "";

    const skip = new Set(["type", "agent", "signature_verified", "jws_signature", "prev_record_hash"]);
    const fields = [];
    // Show the chain + signature provenance fields first (the point of this view)
    if (rec.prev_record_hash) {
      fields.push(`<div class="record-field"><span class="field-key">prev_record_hash</span><span class="field-value">${esc(rec.prev_record_hash)}</span></div>`);
    }
    if (rec.jws_signature) {
      const sig = String(rec.jws_signature);
      const short = sig.length > 60 ? sig.slice(0, 48) + "… (" + sig.length + " chars)" : sig;
      fields.push(`<div class="record-field"><span class="field-key">jws_signature</span><span class="field-value">${esc(short)}</span></div>`);
    }
    for (const [k, v] of Object.entries(rec)) {
      if (skip.has(k)) continue;
      const val = (typeof v === "object") ? JSON.stringify(v) : String(v);
      fields.push(`<div class="record-field"><span class="field-key">${esc(k)}</span><span class="field-value">${esc(val.length > 200 ? val.slice(0,200)+"…" : val)}</span></div>`);
    }

    return `
      <div class="record-card type-${esc(type)}">
        <div class="record-top">
          <span class="record-type-badge">${esc(type.replace(/_/g, " "))}</span>
          ${agentLabel}
          <span class="sig-pill ${sigClass}">${esc(sigText)}</span>
        </div>
        ${fields.join("")}
      </div>`;
  }

  async function openCase(caseId) {
    const overlay = document.getElementById("modal-overlay");
    document.getElementById("modal-case-id").textContent = caseId;
    document.getElementById("modal-case-sub").textContent = "Loading audit trail…";
    document.getElementById("modal-body").innerHTML = "";
    overlay.classList.add("open");

    let data;
    try {
      const res = await fetch(`${API_BASE}/api/v1/cases/${encodeURIComponent(caseId)}/audit`);
      if (!res.ok) throw new Error("HTTP " + res.status);
      data = await res.json();
    } catch (err) {
      document.getElementById("modal-body").innerHTML =
        `<div class="verify-banner fail"><span class="verify-icon">✗</span><div class="verify-text fail"><strong>Could not load audit trail</strong><span>${esc(err.message)}</span></div></div>`;
      return;
    }

    document.getElementById("modal-case-sub").textContent =
      `${statusLabel(data.status)} · ${data.record_count} records · backend: ${data.backend}`;

    const ok = data.chain_verified;
    const banner = `
      <div class="verify-banner ${ok ? "ok" : "fail"}">
        <span class="verify-icon">${ok ? "🔒" : "⚠️"}</span>
        <div class="verify-text ${ok ? "ok" : "fail"}">
          <strong>${ok ? "Audit trail verified" : "VERIFICATION FAILED"}</strong>
          <span>${esc(data.chain_message)}</span>
        </div>
      </div>`;

    const recordsHTML = data.records.map(renderRecord).join("");
    document.getElementById("modal-body").innerHTML =
      banner +
      `<div class="rec-meta">${data.signatures_present ? "Each record is individually signed (RSA-PSS SHA-256). Verified against the public key in config/public_key.pem." : "No signatures on this case (pre-Phase 3a record)."}</div>` +
      `<div class="record-list">${recordsHTML}</div>`;
  }

  function closeModal() { document.getElementById("modal-overlay").classList.remove("open"); }
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  async function init() {
    await loadCases();
    renderFilters();
    renderTable();
  }
  init();
</script>

</body>
</html>
