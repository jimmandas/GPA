# GPA — retrieval config (Phase 2: fixture-only).
#
# The full RAG initiative was cut from Phase 2 on 2026-05-27 (see
# docs/SCOPE_DELTAS.md). What remains is the fixture-mode retriever
# the policy mapper actually uses. Fixture integrity is enforced via
# config/tool_registry.yaml (Determinism Contract invariant 4), NOT
# via the removed RAGIndexValidator.
#
# Phase 3 will rebuild this with multi-mode dispatch (pgvector +
# LlamaIndex) once a real parse/chunk/embed pipeline is needed.
# See PHASE_3_BACKLOG.md item #10.

version: "0.3-fixture-only-post-rag-cut"

retriever_kind: "fixture"
corpus_path: "policy/nccn_fixtures"
notes: |
  v0.3 (2026-05-27): Stripped to fixture-mode only after Phase 2 RAG cut.
  The retriever interface (rag/retriever.py) is the durable architectural
  pattern; the Chroma demo and RAGIndexValidator were removed because they
  added complexity without serving a real corpus.
